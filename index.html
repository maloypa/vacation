<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Отпуска на этот год — график и замены</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #eef2f7;
            margin: 0;
            padding: 0;
            /* Убираем внешние отступы, чтобы контент был вплотную к краям на мобильных */
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 0; /* на мобильных убираем скругление, чтобы края не обрезались */
            box-shadow: none;
            overflow: hidden;
            min-height: 100vh;
        }

        /* на больших экранах возвращаем тень и скругление */
        @media (min-width: 768px) {
            .container {
                border-radius: 32px;
                box-shadow: 0 20px 40px -12px rgba(0,0,0,0.12);
                margin: 24px auto;
                min-height: auto;
            }
            body {
                padding: 24px 20px;
            }
        }

        .header {
            background: #1e466e;
            color: white;
            padding: 1.2rem 1rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
        }
        @media (min-width: 480px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .header {
                padding: 1.8rem 2rem;
            }
        }

        .admin-panel {
            background: #f9fbfd;
            padding: 1rem;
            border-bottom: 1px solid #e2edf2;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            row-gap: 16px;
            justify-content: space-between;
            align-items: flex-start;
        }
        @media (min-width: 640px) {
            .admin-panel {
                padding: 1.2rem 2rem;
                gap: 24px;
            }
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 0.9rem 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2edf2;
            flex: 1;
            min-width: 200px;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e466e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .input-group input, .input-group select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbdde6;
            border-radius: 40px;
            font-size: 0.85rem;
            background: white;
        }
        button {
            background: #1e466e;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            touch-action: manipulation;
        }
        button.secondary {
            background: #eef3f9;
            color: #1e466e;
            border: 1px solid #cbdde6;
        }
        button:hover {
            background: #0f3452;
            transform: translateY(-1px);
        }
        button.secondary:hover {
            background: #e2e9f0;
        }
        .toolbar {
            padding: 0.8rem 1rem;
            background: #ffffff;
            border-bottom: 1px solid #e2edf2;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }
        @media (min-width: 640px) {
            .toolbar {
                padding: 0.8rem 2rem;
            }
        }
        .table-wrapper {
            overflow-x: auto;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }
        .vacation-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 500px;
        }
        .vacation-table th {
            background: #eef3f9;
            color: #1e3a5f;
            padding: 12px 8px;
            border-bottom: 2px solid #cde0ec;
            text-align: left;
            font-size: 0.85rem;
        }
        .vacation-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #e2edf2;
            vertical-align: middle;
        }
        .month-separator {
            background: #e2eaf1;
            font-weight: 700;
            font-size: 0.9rem;
            color: #1e466e;
            border-top: 2px solid #cde0ec;
        }
        .month-separator td {
            padding: 6px 8px;
            background: #f1f6fa;
        }
        .employee-badge {
            display: inline-flex;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.75rem;
            color: #1e466e;
        }
        .date-cell {
            font-weight: 500;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .replacement-select {
            width: 100%;
            min-width: 140px;
            padding: 8px 8px;
            border: 1px solid #cbdde6;
            border-radius: 24px;
            font-size: 0.8rem;
            background: white;
            cursor: pointer;
            font-family: inherit;
        }
        .delete-row-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #9aaebf;
            padding: 4px 6px;
            border-radius: 30px;
            transition: 0.1s;
            touch-action: manipulation;
        }
        .delete-row-btn:hover {
            background: #fee2e2;
            color: #c2412c;
        }
        .stats-wrapper {
            background: #f8fafc;
            border-top: 1px solid #e2edf2;
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
        }
        @media (min-width: 640px) {
            .stats-wrapper {
                padding: 1.2rem 2rem;
                gap: 32px;
            }
        }
        .stats-block {
            flex: 1;
            min-width: 200px;
        }
        .stats-title {
            font-weight: 600;
            color: #1e466e;
            font-size: 0.85rem;
            margin-bottom: 10px;
            border-left: 3px solid #1e466e;
            padding-left: 10px;
        }
        .stats-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat-badge {
            background: white;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #dce5ec;
        }
        .stat-badge span {
            font-weight: 700;
            color: #1e466e;
        }
        .empty-stats {
            color: #7f8c8d;
            font-style: italic;
            padding: 6px 0;
            font-size: 0.75rem;
        }
        .footer-note {
            background: #fef9e6;
            padding: 0.6rem 1rem;
            font-size: 0.7rem;
            color: #aa7c3c;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        @media (min-width: 640px) {
            .footer-note {
                padding: 0.7rem 2rem;
            }
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e466e;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90%;
            text-align: center;
            white-space: normal;
        }
        small {
            font-size: 0.7rem;
        }
        @media (max-width: 480px) {
            .card {
                min-width: 100%;
            }
            .input-group {
                flex-direction: column;
            }
            .input-group button {
                width: 100%;
            }
            .replacement-select {
                font-size: 0.75rem;
                padding: 6px 6px;
            }
            .vacation-table th, .vacation-table td {
                padding: 8px 4px;
            }
            .employee-badge {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📅 Отпуска на этот год!</h1>
    </div>

    <div class="admin-panel">
        <div class="card">
            <h3>➕ Новый сотрудник</h3>
            <div class="input-group">
                <input type="text" id="newEmpName" placeholder="Имя" autocomplete="off">
                <input type="text" id="newEmpDates" placeholder="Даты: 01.05, 04.05, 10.07">
                <button id="addEmployeeBtn">Добавить</button>
            </div>
            <small>Формат ДД.ММ (только точки)</small>
        </div>
        <div class="card">
            <h3>📌 Добавить день отпуска</h3>
            <div class="input-group">
                <select id="selectEmployeeForDate"></select>
                <input type="text" id="extraDate" placeholder="Дата (15.08)">
                <button id="addDateToEmpBtn">+ день</button>
            </div>
            <small>Только точки, напр. 01.06</small>
        </div>
        <div class="card">
            <h3>💾 Управление</h3>
            <div class="input-group">
                <button id="resetAllDataBtn" class="secondary" style="background:#fff0e5; color:#b45f2b;">⚠️ Сбросить всё</button>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <button id="saveAllReplacementsBtn">💾 Сохранить замены</button>
        <button id="clearAllCommentsBtn" class="secondary">🗑 Очистить замены</button>
    </div>

    <div class="table-wrapper">
        <table class="vacation-table" id="vacationTable">
            <thead>
                <tr><th>Дата</th><th>Сотрудник</th><th>Кто забирает смену</th><th style="width:40px"></th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="stats-wrapper">
        <div class="stats-block">
            <div class="stats-title">📊 Замены (макс 10):</div>
            <div id="replacementStatsContainer" class="stats-badges"></div>
        </div>
        <div class="stats-block">
            <div class="stats-title">🏝️ Дней в отпуске:</div>
            <div id="vacationDaysStatsContainer" class="stats-badges"></div>
        </div>
    </div>
    <div class="footer-note">
        <span>✏️ Нельзя выбрать себя. Лимит замен — 10.</span>
        <span id="autoSaveHint">✓ автосохранение</span>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ---------- Глобальное состояние ----------
    let vacationItems = [];
    let replacementsMap = {};

    const REPLACEMENT_LIMIT = 10;
    const STORAGE_VACATIONS = 'vacation_system_items_v6';
    const STORAGE_REPLACEMENTS = 'vacation_system_replacements_v6';

    const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
                        "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

    const DEFAULT_EMPLOYEES = [
        { name: "Марсель", dates: ["25.04", "28.04", "01.05", "04.05", "07.05"] },
        { name: "Иван", dates: ["14.05", "17.05", "20.05", "23.05", "26.05"] },
        { name: "Кирилл", dates: ["24.05", "27.05", "30.05", "02.06", "05.06"] },
        { name: "Макс", dates: ["03.07", "06.07", "09.07", "12.07"] }
    ];

    function validateAndNormalizeDate(dateStr) {
        let trimmed = dateStr.trim();
        if (!/^\d{1,2}\.\d{1,2}$/.test(trimmed)) return null;
        let parts = trimmed.split('.');
        let day = parseInt(parts[0], 10);
        let month = parseInt(parts[1], 10);
        if (isNaN(day) || isNaN(month) || day < 1 || day > 31 || month < 1 || month > 12) return null;
        let normalizedDay = day.toString().padStart(2, '0');
        let normalizedMonth = month.toString().padStart(2, '0');
        return `${normalizedDay}.${normalizedMonth}`;
    }

    function getDateValue(dateKey) {
        let [day, month] = dateKey.split('.');
        return (parseInt(month,10) * 100) + parseInt(day,10);
    }

    function buildVacationItemsFromEmployees(employeesArray) {
        const items = [];
        let idCounter = 1;
        employeesArray.forEach(emp => {
            emp.dates.forEach(dateRaw => {
                const normalized = validateAndNormalizeDate(dateRaw);
                if (!normalized) return;
                items.push({
                    id: idCounter++,
                    displayDate: normalized,
                    employee: emp.name,
                    sortKey: normalized,
                });
            });
        });
        items.sort((a,b) => getDateValue(a.sortKey) - getDateValue(b.sortKey));
        return items;
    }

    function getAllEmployees() {
        const employeesSet = new Set();
        vacationItems.forEach(item => employeesSet.add(item.employee));
        return Array.from(employeesSet).sort();
    }

    function persistVacations() {
        const empMap = new Map();
        vacationItems.forEach(item => {
            if (!empMap.has(item.employee)) empMap.set(item.employee, new Set());
            empMap.get(item.employee).add(item.displayDate);
        });
        const employeesArray = [];
        for (let [name, datesSet] of empMap.entries()) {
            employeesArray.push({ name, dates: Array.from(datesSet) });
        }
        localStorage.setItem(STORAGE_VACATIONS, JSON.stringify(employeesArray));
    }

    function loadVacationsFromStorage() {
        const stored = localStorage.getItem(STORAGE_VACATIONS);
        if (stored) {
            try {
                const employeesArray = JSON.parse(stored);
                if (Array.isArray(employeesArray) && employeesArray.length) {
                    return buildVacationItemsFromEmployees(employeesArray);
                }
            } catch(e) {}
        }
        return buildVacationItemsFromEmployees(DEFAULT_EMPLOYEES);
    }

    function loadReplacementsFromStorage() {
        const stored = localStorage.getItem(STORAGE_REPLACEMENTS);
        if (stored) {
            try {
                return JSON.parse(stored);
            } catch(e) { return {}; }
        }
        return {};
    }

    function persistReplacements() {
        localStorage.setItem(STORAGE_REPLACEMENTS, JSON.stringify(replacementsMap));
    }

    function getReplacementCount(employeeName) {
        let count = 0;
        for (let replacer of Object.values(replacementsMap)) {
            if (replacer === employeeName) count++;
        }
        return count;
    }

    function canAssignReplacement(employeeName, excludeKey = null) {
        let currentCount = getReplacementCount(employeeName);
        if (excludeKey && replacementsMap[excludeKey] === employeeName) currentCount--;
        return currentCount < REPLACEMENT_LIMIT;
    }

    function setReplacement(dateDisplay, employeeOnVacation, newReplacer) {
        const key = `${dateDisplay}_${employeeOnVacation}`;
        const oldReplacer = replacementsMap[key] || null;
        if (!newReplacer || newReplacer === "") {
            if (replacementsMap[key]) {
                delete replacementsMap[key];
                persistReplacements();
                updateAllStats();
                return true;
            }
            return true;
        }
        if (oldReplacer === newReplacer) return true;
        if (!canAssignReplacement(newReplacer, key)) {
            showToast(`⚠️ Лимит! "${newReplacer}" уже забирает ${REPLACEMENT_LIMIT} смен.`);
            return false;
        }
        replacementsMap[key] = newReplacer;
        persistReplacements();
        updateAllStats();
        return true;
    }

    function getReplacementForRow(dateDisplay, employeeOnVacation) {
        const key = `${dateDisplay}_${employeeOnVacation}`;
        return replacementsMap[key] || "";
    }

    function clearAllReplacements() {
        if (confirm('Удалить все назначения замен?')) {
            replacementsMap = {};
            persistReplacements();
            updateAllStats();
            renderTable();
            showToast('Все замены удалены');
        }
    }

    function forceSaveAllReplacements() {
        const rows = document.querySelectorAll('#vacationTable tbody tr');
        let changed = false;
        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            if (row.classList.contains('month-separator')) continue;
            const date = row.cells[0].textContent.trim();
            const employee = row.cells[1].textContent.trim();
            const select = row.cells[2].querySelector('.replacement-select');
            if (select) {
                const selectedValue = select.value;
                const key = `${date}_${employee}`;
                const currentStored = replacementsMap[key] || "";
                if (selectedValue !== currentStored) {
                    if (selectedValue === "") {
                        if (replacementsMap[key]) delete replacementsMap[key];
                        changed = true;
                    } else {
                        if (canAssignReplacement(selectedValue, key)) {
                            replacementsMap[key] = selectedValue;
                            changed = true;
                        } else {
                            select.value = currentStored;
                            showToast(`Лимит для "${selectedValue}" превышен`);
                        }
                    }
                }
            }
        }
        if (changed) {
            persistReplacements();
            updateAllStats();
            showToast('Все замены сохранены');
        } else {
            showToast('Ничего не изменилось');
        }
    }

    function deleteVacationItemById(id) {
        const index = vacationItems.findIndex(i => i.id === id);
        if (index !== -1) {
            const item = vacationItems[index];
            const key = `${item.displayDate}_${item.employee}`;
            if (replacementsMap[key]) delete replacementsMap[key];
            vacationItems.splice(index, 1);
            vacationItems.sort((a,b) => getDateValue(a.sortKey) - getDateValue(b.sortKey));
            persistVacations();
            persistReplacements();
            renderTable();
        }
    }

    function addVacationDayToEmployee(employeeName, dateStr) {
        const normalizedDate = validateAndNormalizeDate(dateStr);
        if (!normalizedDate) {
            alert('Неверный формат. Используйте ДД.ММ (точка). Пример: 15.08');
            return false;
        }
        const alreadyExists = vacationItems.some(item => item.employee === employeeName && item.displayDate === normalizedDate);
        if (alreadyExists) {
            alert(`У ${employeeName} уже есть отпуск ${normalizedDate}`);
            return false;
        }
        const newId = Math.max(0, ...vacationItems.map(i => i.id), 0) + 1;
        vacationItems.push({
            id: newId,
            displayDate: normalizedDate,
            employee: employeeName,
            sortKey: normalizedDate,
        });
        vacationItems.sort((a,b) => getDateValue(a.sortKey) - getDateValue(b.sortKey));
        persistVacations();
        renderTable();
        return true;
    }

    function addNewEmployee(name, datesString) {
        const nameTrim = name.trim();
        if (!nameTrim) { alert('Введите имя'); return false; }
        if (!datesString.trim()) { alert('Введите даты через запятую'); return false; }
        let dateArray = datesString.split(',').map(d => d.trim()).filter(d => d.length);
        let validDates = [];
        for (let d of dateArray) {
            const norm = validateAndNormalizeDate(d);
            if (!norm) {
                alert(`Дата "${d}" неверна. Пропущена. Нужно ДД.ММ`);
                continue;
            }
            validDates.push(norm);
        }
        if (validDates.length === 0) return false;
        let added = 0;
        for (let d of validDates) {
            const alreadyExists = vacationItems.some(item => item.employee === nameTrim && item.displayDate === d);
            if (!alreadyExists) {
                const newId = Math.max(0, ...vacationItems.map(i => i.id), 0) + 1;
                vacationItems.push({ id: newId, displayDate: d, employee: nameTrim, sortKey: d });
                added++;
            } else {
                alert(`Дата ${d} для ${nameTrim} уже есть`);
            }
        }
        if (added === 0) return false;
        vacationItems.sort((a,b) => getDateValue(a.sortKey) - getDateValue(b.sortKey));
        persistVacations();
        renderTable();
        return true;
    }

    function resetToDefault() {
        if (confirm('Сбросить всё к исходному состоянию?')) {
            vacationItems = buildVacationItemsFromEmployees(DEFAULT_EMPLOYEES);
            replacementsMap = {};
            persistReplacements();
            persistVacations();
            renderTable();
            showToast('Сброс выполнен');
        }
    }

    function updateEmployeeSelect() {
        const select = document.getElementById('selectEmployeeForDate');
        if (!select) return;
        const employees = getAllEmployees();
        select.innerHTML = '';
        if (employees.length === 0) {
            select.innerHTML = '<option>Нет сотрудников</option>';
            return;
        }
        employees.forEach(emp => {
            const option = document.createElement('option');
            option.value = emp;
            option.textContent = emp;
            select.appendChild(option);
        });
    }

    function updateReplacementStats() {
        const container = document.getElementById('replacementStatsContainer');
        if (!container) return;
        const counter = new Map();
        for (let replacer of Object.values(replacementsMap)) {
            if (replacer) counter.set(replacer, (counter.get(replacer) || 0) + 1);
        }
        container.innerHTML = '';
        if (counter.size === 0) {
            container.innerHTML = '<div class="empty-stats">Нет назначений</div>';
            return;
        }
        const sorted = Array.from(counter.entries()).sort((a,b) => b[1] - a[1]);
        for (let [name, count] of sorted) {
            const badge = document.createElement('div');
            badge.className = 'stat-badge';
            badge.innerHTML = `👤 ${name} <span>${count}</span> ${declension(count)}${count >= REPLACEMENT_LIMIT ? ' ⛔' : ''}`;
            container.appendChild(badge);
        }
    }

    function updateVacationDaysStats() {
        const container = document.getElementById('vacationDaysStatsContainer');
        if (!container) return;
        const vacationCounter = new Map();
        for (let item of vacationItems) {
            vacationCounter.set(item.employee, (vacationCounter.get(item.employee) || 0) + 1);
        }
        container.innerHTML = '';
        if (vacationCounter.size === 0) {
            container.innerHTML = '<div class="empty-stats">Нет данных</div>';
            return;
        }
        const sorted = Array.from(vacationCounter.entries()).sort((a,b) => b[1] - a[1]);
        for (let [name, days] of sorted) {
            const badge = document.createElement('div');
            badge.className = 'stat-badge';
            badge.innerHTML = `🏖️ ${name} <span>${days}</span> ${declensionDays(days)}`;
            container.appendChild(badge);
        }
    }

    function updateAllStats() {
        updateReplacementStats();
        updateVacationDaysStats();
    }

    function declension(n) {
        if (n % 10 === 1 && n % 100 !== 11) return 'смена';
        if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'смены';
        return 'смен';
    }
    function declensionDays(n) {
        if (n % 10 === 1 && n % 100 !== 11) return 'день';
        if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'дня';
        return 'дней';
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        const allEmployees = getAllEmployees();
        
        let currentMonth = -1;
        for (let item of vacationItems) {
            const month = parseInt(item.sortKey.split('.')[1], 10);
            if (month !== currentMonth) {
                currentMonth = month;
                const monthRow = tbody.insertRow();
                monthRow.classList.add('month-separator');
                const monthCell = monthRow.insertCell(0);
                monthCell.colSpan = 4;
                monthCell.textContent = `📅 ${monthNames[month-1]}`;
                monthCell.style.fontWeight = 'bold';
                monthCell.style.backgroundColor = '#f1f6fa';
            }
            
            const row = tbody.insertRow();
            const dateCell = row.insertCell(0);
            dateCell.className = 'date-cell';
            dateCell.textContent = item.displayDate;
            
            const empCell = row.insertCell(1);
            const badge = document.createElement('span');
            badge.className = 'employee-badge';
            badge.textContent = item.employee;
            empCell.appendChild(badge);
            
            const selectCell = row.insertCell(2);
            const select = document.createElement('select');
            select.className = 'replacement-select';
            const emptyOption = document.createElement('option');
            emptyOption.value = '';
            emptyOption.textContent = '— не выбрано —';
            select.appendChild(emptyOption);
            
            const availableEmployees = allEmployees.filter(emp => emp !== item.employee);
            availableEmployees.forEach(emp => {
                const option = document.createElement('option');
                option.value = emp;
                option.textContent = emp;
                select.appendChild(option);
            });
            
            const currentReplacer = getReplacementForRow(item.displayDate, item.employee);
            select.value = currentReplacer;
            let lastValidValue = currentReplacer;
            select.addEventListener('change', (e) => {
                const newValue = e.target.value;
                if (newValue === "") {
                    setReplacement(item.displayDate, item.employee, "");
                    lastValidValue = "";
                    return;
                }
                const success = setReplacement(item.displayDate, item.employee, newValue);
                if (success) lastValidValue = newValue;
                else select.value = lastValidValue;
            });
            selectCell.appendChild(select);
            
            const actionCell = row.insertCell(3);
            const delBtn = document.createElement('button');
            delBtn.textContent = '❌';
            delBtn.className = 'delete-row-btn';
            delBtn.title = 'Удалить';
            delBtn.addEventListener('click', () => {
                if (confirm(`Удалить отпуск ${item.displayDate} для ${item.employee}?`)) {
                    deleteVacationItemById(item.id);
                }
            });
            actionCell.appendChild(delBtn);
        }
        updateEmployeeSelect();
        updateAllStats();
    }
    
    function init() {
        vacationItems = loadVacationsFromStorage();
        replacementsMap = loadReplacementsFromStorage();
        const currentSet = new Set(getAllEmployees());
        let needClean = false;
        for (let [key, replacer] of Object.entries(replacementsMap)) {
            if (replacer && !currentSet.has(replacer)) {
                delete replacementsMap[key];
                needClean = true;
            }
        }
        if (needClean) persistReplacements();
        vacationItems.sort((a,b) => getDateValue(a.sortKey) - getDateValue(b.sortKey));
        renderTable();
        
        document.getElementById('addEmployeeBtn')?.addEventListener('click', () => {
            const name = document.getElementById('newEmpName').value;
            const dates = document.getElementById('newEmpDates').value;
            if (addNewEmployee(name, dates)) {
                document.getElementById('newEmpName').value = '';
                document.getElementById('newEmpDates').value = '';
            }
        });
        document.getElementById('addDateToEmpBtn')?.addEventListener('click', () => {
            const select = document.getElementById('selectEmployeeForDate');
            const employee = select.value;
            const date = document.getElementById('extraDate').value;
            if (!employee || employee === 'Нет сотрудников') { alert('Выберите сотрудника'); return; }
            if (addVacationDayToEmployee(employee, date)) {
                document.getElementById('extraDate').value = '';
            }
        });
        document.getElementById('resetAllDataBtn')?.addEventListener('click', resetToDefault);
        document.getElementById('clearAllCommentsBtn')?.addEventListener('click', clearAllReplacements);
        document.getElementById('saveAllReplacementsBtn')?.addEventListener('click', forceSaveAllReplacements);
    }
    
    init();
</script>
</body>
